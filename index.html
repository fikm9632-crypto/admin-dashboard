<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>

  <style>
    :root{
      --bg0:#060b16;
      --bg1:#071629;
      --bg2:#081b2f;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.04);
      --stroke:rgba(255,255,255,.14);
      --stroke2:rgba(255,255,255,.10);
      --text:#e7edf7;
      --muted:rgba(231,237,247,.70);

      --teal:#22d3ee;
      --green:#34d399;
      --red:#fb7185;
      --amber:#fbbf24;

      --shadow: 0 18px 50px rgba(0,0,0,.55);
      --r-lg:22px;
      --r-md:16px;
      --r-pill:999px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 600px at 12% 0%, rgba(16,185,129,.18), transparent 55%),
        radial-gradient(900px 600px at 60% 10%, rgba(34,211,238,.12), transparent 55%),
        radial-gradient(900px 600px at 50% 110%, rgba(245,158,11,.10), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg0));
      overflow-x:hidden;
    }

    .shell{
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 18px 36px;
    }

    .glass{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--stroke);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .topbar{
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 14px 18px;
      border-radius: var(--r-lg);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom: 18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 240px;
    }
    .brandIcon{
      width:38px;height:38px;border-radius:14px;
      background: linear-gradient(180deg, rgba(34,211,238,.95), rgba(16,185,129,.85));
      box-shadow: 0 10px 25px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.18);
    }
    .brandTitle{
      display:flex;flex-direction:column;line-height:1.1;
    }
    .brandTitle b{font-size:18px;letter-spacing:.2px}
    .brandTitle span{font-size:12.5px;color:var(--muted);margin-top:3px}

    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 9px 14px;
      font-weight: 600;
      font-size: 13px;
      cursor:pointer;
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
      user-select:none;
    }
    .btn:active{transform: translateY(1px)}
    .btn:hover{border-color: rgba(255,255,255,.22); background: rgba(0,0,0,.22)}
    .btn--primary{
      background: rgba(16,185,129,.20);
      border-color: rgba(16,185,129,.45);
    }
    .btn--danger{
      background: rgba(251,113,133,.12);
      border-color: rgba(251,113,133,.45);
      color: #ffd7de;
    }
    .btn--outline{
      background: rgba(0,0,0,.10);
      border-color: rgba(255,255,255,.22);
    }

    .muted{color:var(--muted)}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}

    /* LOGIN LAYOUT */
    .centerWrap{
      min-height: calc(100vh - 56px);
      display:grid;
      place-items:center;
      padding: 26px 16px 40px;
    }
    .loginCard{
      width: min(560px, 92vw);
      padding: 24px;
    }
    .loginHead{
      display:flex;align-items:center;gap:12px;margin-bottom:18px;
    }
    .loginTitleWrap{line-height:1.15}
    .loginTitle{font-size:22px;font-weight:800;margin:0}
    .loginSub{margin:4px 0 0;color:var(--muted);font-size:13px}

    .field{margin-top:14px}
    .label{font-size:12.5px;color:rgba(231,237,247,.85);margin-bottom:8px}

    .inputShell{
      display:flex;align-items:center;gap:10px;
      border-radius: var(--r-md);
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,.18);
      padding: 10px 12px;
    }
    .ico{
      width:22px;height:22px;opacity:.85;flex:0 0 auto;
      display:grid;place-items:center;
    }
    .inputShell input{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:14px;
    }
    .inputShell input::placeholder{color: rgba(231,237,247,.45)}
    .miniBtn{
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 7px 10px;
      font-weight: 700;
      font-size: 12px;
      cursor:pointer;
    }

    .signBtn{
      width:100%;
      margin-top: 16px;
      padding: 12px 14px;
      font-size: 15px;
    }
    .loginFoot{
      text-align:center;
      margin-top: 12px;
      font-size: 12.5px;
      color: rgba(231,237,247,.55);
    }
    .errorLine{margin-top:10px;color:#ffb4c0;font-size:13px;min-height:18px}

    /* DASHBOARD */
    .stats{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 16px 0 14px;
    }
    .stat{
      padding: 16px 16px 14px;
      border-radius: var(--r-lg);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 14px 35px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }
    .stat .k{font-size:13px;color:rgba(231,237,247,.78)}
    .stat .v{font-size:34px;font-weight:900;margin-top:8px}
    .stat .s{font-size:13px;color:rgba(231,237,247,.58);margin-top:4px}

    .controls{
      display:grid;
      grid-template-columns: 1.6fr .7fr .7fr;
      gap: 12px;
      align-items:center;
      margin: 10px 0 14px;
    }
    .search{
      display:flex;align-items:center;gap:10px;
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,.20);
      padding: 10px 12px;
    }
    .search input{
      width:100%;
      border:0;outline:none;background:transparent;color:var(--text);
      font-size:14px;
    }
    .search input::placeholder{color: rgba(231,237,247,.45)}

    select{
      width:100%;
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke2);
      background: rgba(0,0,0,.20);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
      appearance:none;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 6px;
    }

    .card{
      padding: 16px;
      border-radius: var(--r-lg);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 14px 35px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
      min-height: 260px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .cardHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
    }
    .title{
      font-size: 18px;
      font-weight: 900;
      margin:0;
    }
    .meta{
      display:grid;
      gap: 6px;
      margin-top: 6px;
      font-size: 13.5px;
      color: rgba(231,237,247,.72);
    }
    .metaRow{display:flex;gap:8px;flex-wrap:wrap}
    .dot{opacity:.55}

    .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}
    .pill{
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,.20);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(0,0,0,.12);
      white-space:nowrap;
    }
    .pill--new{border-color: rgba(34,211,238,.55); background: rgba(34,211,238,.10)}
    .pill--progress{border-color: rgba(16,185,129,.55); background: rgba(16,185,129,.10)}
    .pill--closed{border-color: rgba(148,163,184,.35); background: rgba(148,163,184,.10)}
    .pill--low{border-color: rgba(16,185,129,.55); background: rgba(16,185,129,.08)}
    .pill--med{border-color: rgba(251,191,36,.55); background: rgba(251,191,36,.08)}
    .pill--high{border-color: rgba(251,113,133,.55); background: rgba(251,113,133,.08)}
    .pill--dup{border-color: rgba(255,255,255,.22); background: rgba(255,255,255,.08); font-weight:900}

    .descLabel{font-size:13px;color:rgba(231,237,247,.72);font-weight:800}
    .descBox{
      border-radius: var(--r-md);
      border: 1px solid rgba(34,211,238,.35);
      background: rgba(0,0,0,.18);
      padding: 12px 12px;
      min-height: 54px;
      color: rgba(231,237,247,.92);
      overflow:hidden;
    }

    .rowBtns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:auto;
    }
    .btnSmall{
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding: 9px 12px;
      font-weight: 800;
      font-size: 13px;
      cursor:pointer;
    }
    .btnSmall--ok{
      border-color: rgba(16,185,129,.50);
      background: rgba(16,185,129,.12);
    }
    .btnSmall--danger{
      border-color: rgba(251,113,133,.45);
      background: rgba(251,113,133,.10);
      color:#ffd7de;
    }

    .idLine{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      color:rgba(231,237,247,.65);
      font-size:13px;
    }

    .adminNote{
      width:100%;
      border-radius: var(--r-md);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding: 10px 12px;
      outline:none;
      min-height: 56px;
      resize: vertical;
    }

    .thinLine{opacity:.55;font-size:12.5px}

    @media (max-width: 1100px){
      .stats{grid-template-columns: repeat(2, 1fr)}
      .grid{grid-template-columns: repeat(2, 1fr)}
      .controls{grid-template-columns: 1.5fr 1fr 1fr}
    }
    @media (max-width: 720px){
      .grid{grid-template-columns: 1fr}
      .controls{grid-template-columns: 1fr}
      .actions{justify-content:flex-start}
      .brand{min-width:auto}
    }
  </style>
</head>

<body>
  <div class="shell">
    <!-- TOP BAR -->
    <div id="topbar" class="topbar glass" style="display:none;">
      <div class="brand">
        <div class="brandIcon"></div>
        <div class="brandTitle">
          <b>Admin Dashboard</b>
          <span>Reports Center • Live</span>
        </div>
      </div>

      <div class="actions">
        <button id="soundBtn" class="btn btn--outline">Sound: On</button>
        <button id="refreshBtnTop" class="btn btn--outline">Refresh</button>
        <button id="logoutBtn" class="btn btn--danger">Logout</button>
      </div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView" class="centerWrap">
      <div class="loginCard glass">
        <div class="loginHead">
          <div class="brandIcon" style="width:36px;height:36px;border-radius:14px;"></div>
          <div class="loginTitleWrap">
            <h1 class="loginTitle">Admin Portal</h1>
            <div class="loginSub">Sign in to manage reports</div>
          </div>
        </div>

        <div class="field">
          <div class="label">Email</div>
          <div class="inputShell">
            <div class="ico" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="rgba(231,237,247,.9)" stroke-width="2"/>
                <path d="M19.5 12c0 4.14-3.36 7.5-7.5 7.5S4.5 16.14 4.5 12 7.86 4.5 12 4.5c3.44 0 6.35 2.34 7.22 5.5.42 1.55-.71 2.5-2.22 2.5H15a2 2 0 0 1-2-2V8" stroke="rgba(231,237,247,.9)" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <input id="email" type="email" placeholder="admin@test.com" autocomplete="username" />
          </div>
        </div>

        <div class="field">
          <div class="label">Password</div>
          <div class="inputShell">
            <div class="ico" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="rgba(231,237,247,.9)" stroke-width="2" stroke-linecap="round"/>
                <path d="M6.5 11h11A2.5 2.5 0 0 1 20 13.5v5A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-5A2.5 2.5 0 0 1 6.5 11Z" stroke="rgba(231,237,247,.9)" stroke-width="2"/>
              </svg>
            </div>
            <input id="password" type="password" placeholder="••••••••••" autocomplete="current-password" />
            <button id="togglePass" class="miniBtn" type="button">Show</button>
          </div>
        </div>

        <button id="loginBtn" class="btn btn--primary signBtn">Sign in</button>
        <div id="authMsg" class="errorLine"></div>
        <div class="loginFoot">Protected access • Admins only</div>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashView" style="display:none;">
      <div class="stats">
        <div class="stat">
          <div class="k">Total Reports</div>
          <div class="v" id="stTotal">0</div>
          <div class="s">All time</div>
        </div>
        <div class="stat">
          <div class="k">New</div>
          <div class="v" id="stNew">0</div>
          <div class="s">Needs review</div>
        </div>
        <div class="stat">
          <div class="k">Potential duplicates</div>
          <div class="v" id="stDup">0</div>
          <div class="s">Auto-detected</div>
        </div>
        <div class="stat">
          <div class="k">Latest</div>
          <div class="v" style="font-size:18px;margin-top:10px" id="stLatest">—</div>
          <div class="s">Most recent timestamp</div>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <div class="ico" aria-hidden="true" style="opacity:.7">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(231,237,247,.9)" stroke-width="2"/>
              <path d="M16.5 16.5 21 21" stroke="rgba(231,237,247,.9)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <input id="searchInput" placeholder="Search by name, email, threat, description..." />
        </div>

        <select id="filterStatus">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="in_progress">In progress</option>
          <option value="closed">Resolved</option>
        </select>

        <select id="sortBy">
          <option value="created_desc">Newest first</option>
          <option value="created_asc">Oldest first</option>
        </select>
      </div>

      <div class="muted" style="font-size:13px;margin: 4px 0 10px;">
        Note: If you’re not Admin, you won’t see anything due to RLS.
      </div>

      <div id="reports" class="grid"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://qbduqcazeoyuqgixprhi.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZHVxY2F6ZW95dXFnaXhwcmhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIzNDg2ODYsImV4cCI6MjA3NzkyNDY4Nn0.XQEEPPq_q96ahbDabSXEW_6kavaMO_xwJOmFKBKABdo";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const topbar = document.getElementById("topbar");
    const loginView = document.getElementById("loginView");
    const dashView = document.getElementById("dashView");
    const reportsDiv = document.getElementById("reports");
    const authMsg = document.getElementById("authMsg");

    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtnTop = document.getElementById("refreshBtnTop");
    const filterStatus = document.getElementById("filterStatus");
    const sortBy = document.getElementById("sortBy");
    const searchInput = document.getElementById("searchInput");

    const stTotal = document.getElementById("stTotal");
    const stNew = document.getElementById("stNew");
    const stDup = document.getElementById("stDup");
    const stLatest = document.getElementById("stLatest");

    const soundBtn = document.getElementById("soundBtn");
    let soundOn = true;

    // ===== SOUND (REAL) =====
    let audioCtx = null;
    let lastSeenCreatedAt = null;
    let realtimeChannel = null;

    function ensureAudioUnlocked(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function playBeep(){
      if (!soundOn) return;

      // لازم يكون فيه تفاعل من المستخدم أول مرة (مثل ضغط Sound أو Sign in)
      ensureAudioUnlocked();

      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      o.type = "sine";
      o.frequency.value = 880;

      const now = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

      o.connect(g);
      g.connect(audioCtx.destination);

      o.start(now);
      o.stop(now + 0.2);
    }

    function subscribeRealtime(){
      if (realtimeChannel) return;

      realtimeChannel = supabase
        .channel("reports-live")
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "reports" },
          async () => {
            playBeep();
            await renderReports();
          }
        )
        .subscribe((status) => {
          // optional: console.log("Realtime status:", status);
        });
    }

    function unsubscribeRealtime(){
      if (!realtimeChannel) return;
      supabase.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }

    // ========================

    function escapeHtml(str){
      return String(str ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function fmtDate(iso){
      try{
        return iso ? new Date(iso).toLocaleString() : "—";
      }catch{ return "—"; }
    }

    function statusInfo(s){
      const map = {
        new: { label: "new", cls: "pill--new" },
        in_progress: { label: "in progress", cls: "pill--progress" },
        closed: { label: "resolved", cls: "pill--closed" },
      };
      return map[s] ?? { label: s ?? "—", cls: "pill--closed" };
    }

    function severityInfo(v){
      const val = (v ?? "").toString().toLowerCase();
      if (val.includes("high") || val.includes("عالي")) return { cls:"pill--high" };
      if (val.includes("med") || val.includes("متوسط")) return { cls:"pill--med" };
      if (val.includes("low") || val.includes("منخفض")) return { cls:"pill--low" };
      return { cls:"pill--med" };
    }

    function inferDupCount(r){
      const n =
        r.potential_dup_count ??
        r.dup_count ??
        r.duplicates ??
        r.duplicate_count ??
        0;

      if (Number.isFinite(n) && n > 0) return n;

      if (r.is_potential_duplicate || r.potential_dup || r.duplicate_of || r.dup_group_id) return 1;
      return 0;
    }

    async function getAllForStats(){
      const { data, error } = await supabase
        .from("reports")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(500);

      if (error) return { all: [], error };
      return { all: data ?? [], error: null };
    }

    async function renderReports(){
      reportsDiv.innerHTML = `<div class="card">Loading…</div>`;

      const { all, error } = await getAllForStats();
      if (error){
        reportsDiv.innerHTML = `<div class="card">Error: ${escapeHtml(error.message)}</div>`;
        return;
      }

      // Stats
      const total = all.length;
      const newCount = all.filter(x => x.status === "new").length;
      const dupCount = all.reduce((acc, r) => acc + (inferDupCount(r) ? 1 : 0), 0);
      const latest = all[0]?.created_at ? fmtDate(all[0].created_at) : "—";

      stTotal.textContent = total;
      stNew.textContent = newCount;
      stDup.textContent = dupCount;
      stLatest.textContent = latest;

      // Beep على Refresh لو فيه بلاغ أحدث من آخر مرة
      if (all[0]?.created_at) {
        if (lastSeenCreatedAt && new Date(all[0].created_at) > new Date(lastSeenCreatedAt)) {
          playBeep();
        }
        lastSeenCreatedAt = all[0].created_at;
      }

      // Filters
      let list = [...all];

      const st = filterStatus.value;
      if (st) list = list.filter(x => x.status === st);

      const term = searchInput.value.trim().toLowerCase();
      if (term){
        list = list.filter(r => {
          const blob = [
            r.name, r.email, r.phone, r.type, r.severity, r.status, r.description, r.admin_note,
            r.threat, r.threat_title
          ].map(x => (x ?? "").toString().toLowerCase()).join(" | ");
          return blob.includes(term);
        });
      }

      const s = sortBy.value;
      if (s === "created_asc") list.sort((a,b) => (a.created_at ?? "").localeCompare(b.created_at ?? ""));
      else list.sort((a,b) => (b.created_at ?? "").localeCompare(a.created_at ?? ""));

      if (!list.length){
        reportsDiv.innerHTML = `<div class="card">No reports</div>`;
        return;
      }

      reportsDiv.innerHTML = list.map(r => {
        const st = statusInfo(r.status);
        const sev = severityInfo(r.severity);
        const dup = inferDupCount(r);

        const title = r.threat_title || r.threat || " Threat";
        const typeLabel = r.type || "—";
        const sevLabel = r.severity || "—";

        return `
          <div class="card" data-id="${escapeHtml(r.id)}">
            <div class="cardHead">
              <div>
                <h3 class="title">${escapeHtml(title)}</h3>
                <div class="meta">
                  <div class="metaRow"><span class="dot">•</span> Date: <span class="mono">${escapeHtml(fmtDate(r.created_at))}</span></div>
                  <div class="metaRow"><span class="dot">•</span> Name: <span>${escapeHtml(r.name)}</span></div>
                  <div class="metaRow"><span class="dot">•</span> Email: <span class="mono">${escapeHtml(r.email)}</span></div>
                  <div class="metaRow"><span class="dot">•</span> Phone: <span class="mono">${escapeHtml(r.phone)}</span></div>
                </div>
              </div>

              <div class="pills">
                <span class="pill ${sev.cls}">${escapeHtml(sevLabel)}</span>
                <span class="pill ${st.cls}">${escapeHtml(st.label)}</span>
                <span class="pill">${escapeHtml(typeLabel)}</span>
                ${dup ? `<span class="pill pill--dup">Potential dup ×${dup}</span>` : ``}
              </div>
            </div>

            <div class="descLabel">Description:</div>
            <div class="descBox">${escapeHtml(r.description)}</div>

            <div class="idLine">
              <span>ID:</span>
              <span class="mono">${escapeHtml((r.id ?? "").toString().slice(0,10))}${(r.id && r.id.toString().length>10) ? "…" : ""}</span>
              <button class="btnSmall" data-act="copyId">Copy ID</button>
            </div>

            <div class="rowBtns">
              <button class="btnSmall" data-act="copyEmail">Copy email</button>
              <button class="btnSmall" data-act="copyPhone">Copy phone</button>
              <button class="btnSmall btnSmall--ok" data-act="setProgress">In progress</button>
              <button class="btnSmall btnSmall--ok" data-act="setResolved">Resolved</button>
            </div>

            <div class="rowBtns">
              <button class="btnSmall" data-act="reset">Reset</button>
              <button class="btnSmall" data-act="archive">Archive</button>
              <button class="btnSmall btnSmall--danger" data-act="delete">Delete</button>
            </div>

            <textarea class="adminNote" placeholder="Admin note (optional)">${escapeHtml(r.admin_note)}</textarea>
            <div class="rowBtns">
              <button class="btnSmall btnSmall--ok" data-act="saveNote">Save note</button>
            </div>

            <div class="thinLine">Updated: <span class="mono">${escapeHtml(fmtDate(r.updated_at))}</span></div>
          </div>
        `;
      }).join("");

      // Bind actions
      reportsDiv.querySelectorAll(".card").forEach(card => {
        const id = card.getAttribute("data-id");
        const noteEl = card.querySelector(".adminNote");

        card.querySelectorAll("button[data-act]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const act = btn.getAttribute("data-act");

            // find row
            const row = list.find(x => String(x.id) === String(id));
            const email = row?.email ?? "";
            const phone = row?.phone ?? "";

            if (act === "copyId"){
              await navigator.clipboard.writeText(String(id));
              alert("Copied ✅");
              return;
            }
            if (act === "copyEmail"){
              await navigator.clipboard.writeText(String(email));
              alert("Copied ✅");
              return;
            }
            if (act === "copyPhone"){
              await navigator.clipboard.writeText(String(phone));
              alert("Copied ✅");
              return;
            }

            if (act === "saveNote"){
              const admin_note = noteEl.value ?? "";
              const { error } = await supabase.from("reports").update({
                admin_note,
                updated_at: new Date().toISOString(),
              }).eq("id", id);

              if (error) alert("Failed: " + error.message);
              else alert("Saved ✅");
              return;
            }

            if (act === "setProgress" || act === "setResolved" || act === "reset" || act === "archive"){
              let status = "new";
              if (act === "setProgress") status = "in_progress";
              if (act === "setResolved") status = "closed";
              if (act === "archive") status = "closed"; // archive = closed (UI mapping)

              const { error } = await supabase.from("reports").update({
                status,
                updated_at: new Date().toISOString(),
              }).eq("id", id);

              if (error) alert("Failed: " + error.message);
              else await renderReports();
              return;
            }

            if (act === "delete"){
              const ok = confirm("Are you sure you want to delete this report?");
              if (!ok) return;

              const { error } = await supabase.from("reports").delete().eq("id", id);
              if (error) alert("Failed: " + error.message);
              else await renderReports();
              return;
            }
          });
        });
      });
    }

    async function checkSession(){
      const { data } = await supabase.auth.getSession();
      const session = data?.session;

      if (session){
        topbar.style.display = "flex";
        loginView.style.display = "none";
        dashView.style.display = "block";

        // فعّل realtime
        subscribeRealtime();

        await renderReports();
      } else {
        topbar.style.display = "none";
        dashView.style.display = "none";
        loginView.style.display = "grid";

        // سكّر realtime
        unsubscribeRealtime();
      }
    }

    // Login
    document.getElementById("loginBtn").addEventListener("click", async () => {
      authMsg.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // مهم: هذا تفاعل من المستخدم، نفك قفل الصوت هنا كمان
      ensureAudioUnlocked();

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) authMsg.textContent = "Error: " + error.message;
      else await checkSession();
    });

    // Toggle password
    document.getElementById("togglePass").addEventListener("click", () => {
      const p = document.getElementById("password");
      const isPass = p.type === "password";
      p.type = isPass ? "text" : "password";
      document.getElementById("togglePass").textContent = isPass ? "Hide" : "Show";
    });

    // Logout
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      await checkSession();
    });

    // Refresh
    refreshBtnTop.addEventListener("click", renderReports);

    // Filters
    filterStatus.addEventListener("change", renderReports);
    sortBy.addEventListener("change", renderReports);
    searchInput.addEventListener("input", () => {
      clearTimeout(window.__srchT);
      window.__srchT = setTimeout(renderReports, 250);
    });

    // Sound toggle + unlock + test beep
    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;

      // مهم: المتصفح ما يسمح بالصوت إلا بعد تفاعل
      ensureAudioUnlocked();

      soundBtn.textContent = "Sound: " + (soundOn ? "On" : "Off");
      if (soundOn) playBeep(); // اختبار
    });

    await checkSession();
  </script>
</body>
</html>
